---
- name: Déploiement complet Cloud-Security-Detection-Platform
  hosts: aws
  become: yes
  vars:
    cloud_scripts_src: "/cloudlab/scripts/"
    cloud_scripts_dest: "/opt/cloud-scripts"
    apache_logrotate_template: "/cloudlab/ansible/templates/apache_logrotate.j2"
    cloudwatch_sns_topic_arn: "arn:aws:sns:us-west-1:798329741052:cloud-sec-alerts"
    cloudtrail_bucket_name: "cloudtrail-logs-798329741052"
    cloudtrail_role_name: "CloudSecDetectionRole"

  tasks:
    # --- Mise à jour des paquets ---
    - name: Mettre à jour tous les paquets
      ansible.builtin.yum:
        name: "*"
        state: latest

    # --- Installation et configuration Apache ---
    - name: Installer Apache
      ansible.builtin.yum:
        name: httpd
        state: present

    - name: Démarrer et activer Apache
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: yes

    # --- Création des répertoires pour les scripts et logs ---
    - name: Créer répertoire pour les scripts
      ansible.builtin.file:
        path: "{{ cloud_scripts_dest }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Créer répertoire pour les logs personnalisés
      ansible.builtin.file:
        path: /var/log/cloud-scripts
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    # --- Déploiement des scripts de détection ---
    - name: Copier les scripts sur l'EC2
      ansible.builtin.copy:
        src: "{{ cloud_scripts_src }}/"
        dest: "{{ cloud_scripts_dest }}/"
        owner: ec2-user
        group: ec2-user
        mode: '0755'
        remote_src: no

    # --- Configuration de la rotation des logs Apache ---
    - name: Configurer logrotate pour Apache
      ansible.builtin.template:
        src: "{{ apache_logrotate_template }}"
        dest: /etc/logrotate.d/httpd
        owner: root
        group: root
        mode: '0644'

    # --- Configuration des alertes CloudWatch ---
    - name: Créer une alarme CloudWatch pour erreurs Apache
      ansible.builtin.command: >
        aws cloudwatch put-metric-alarm
        --alarm-name "ApacheErrors"
        --metric-name "4xxError"
        --namespace "AWS/Logs"
        --statistic Sum
        --period 300
        --threshold 5
        --comparison-operator GreaterThanThreshold
        --evaluation-periods 1
        --alarm-actions {{ cloudwatch_sns_topic_arn }}
        --region us-west-1

    # --- Vérifier que le bucket CloudTrail existe ---
    - name: Vérifier que le bucket CloudTrail existe
      amazon.aws.s3_bucket_info:
        name: "{{ cloudtrail_bucket_name }}"
        region: us-west-1
      register: bucket_info
      ignore_errors: yes

    # --- Créer le bucket S3 pour CloudTrail si nécessaire ---
    - name: Créer le bucket S3 pour CloudTrail si nécessaire
      amazon.aws.s3_bucket:
        name: "{{ cloudtrail_bucket_name }}"
        acl: private
        region: us-west-1
        versioning: yes
        encryption: AES256
      when: bucket_info.buckets is not defined or bucket_info.buckets | length == 0

    # --- Activer CloudTrail ---
    - name: Activer CloudTrail
      amazon.aws.cloudtrail:
        name: "cloud-sec-trail"
        s3_bucket_name: "{{ cloudtrail_bucket_name }}"
        include_global_service_events: yes
        is_multi_region_trail: yes
        enable_log_file_validation: yes
        region: us-west-1

    # --- Configurer CloudWatch Logs pour CloudTrail ---
    - name: Créer un groupe CloudWatch Logs pour CloudTrail
      amazon.aws.cloudwatchlogs_log_group:
        log_group_name: "/aws/cloudtrail/cloud-sec-trail"
        retention: 90
        region: us-west-1

    # --- IAM Role CloudSecDetectionRole déjà attaché à l'EC2 via Terraform ---
    # Plus besoin de recréer ni attacher le rôle pour VPC Flow Logs ici
